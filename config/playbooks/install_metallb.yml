# /config/playbooks/install_metallb.yml
---
- name: Install or Uninstall MetalLB
  hosts: all
  become: yes

  vars:
    addon_state: "present"
    requested_version: ""
    # (You can override IP pool here or in group_vars)
    # metallb_ip_range: "192.0.2.200-192.0.2.220"

  roles:
    - role: metallb_install
