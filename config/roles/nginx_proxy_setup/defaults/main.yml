# /config/roles/nginx_proxy_setup/defaults/main.yml
---
# Root directory, as in your example
nginx_proxy_root_dir: "/srv/nginx-proxy"

# Upstream service IP addresses
nginx_proxy_upstreams:
  # Used in 'stream', prefix not needed
  k8s_ingress: '{{ nginx_proxy_ips.k8s_ingress | default("192.0.2.200:443") }}'
  gitlab_ssh: '{{ nginx_proxy_ips.gitlab_ssh | default("192.0.2.104:22") }}'
  proxmox_ssh: '{{ nginx_proxy_ips.proxmox_ssh | default("192.0.2.101:22") }}'

  # Used in 'http', prefix required in variable
  wiki_http: '{{ nginx_proxy_ips.wiki_http | default("http://192.0.2.5:3000") }}'
  plantuml_http: '{{ nginx_proxy_ips.plantuml_http | default("http://192.0.2.5:18080") }}'
  grafana_http: '{{ nginx_proxy_ips.grafana_http | default("http://192.0.2.108:3000") }}'
  jenkins_http: '{{ nginx_proxy_ips.jenkins_http | default("http://192.0.2.110:8080") }}'
  vault_http: '{{ nginx_proxy_ips.vault_http | default("http://192.0.2.109:8200") }}'
  minio_s3_api: "http://minio-server:9000"
  minio_console: "http://minio-server:9001"
  proxmox_https: '{{ nginx_proxy_ips.proxmox_https | default("https://192.0.2.101:8006") }}'

  # Used in 'http', BUT 'http://' prefix is already in the .j2 template
  gitlab_http: '{{ nginx_proxy_ips.gitlab_http | default("192.0.2.104:80") }}'
  harbor_http: '{{ nginx_proxy_ips.harbor_http | default("192.0.2.103:80") }}'
