# config/roles/nginx_proxy_setup/defaults/main.yml
# /config/roles/nginx_proxy_setup/defaults/main.yml
---
# Корневая директория, как в Вашем примере
nginx_proxy_root_dir: "/srv/nginx-proxy"

# IP-адреса upstream-сервисов (из Ваших конфигов)
# (Мы делаем их переменными, чтобы легко менять в group_vars)
nginx_proxy_upstreams:
  k8s_ingress: "192.0.2.200:443"
  gitlab_ssh: "192.0.2.104:22"
  gitlab_http: "192.0.2.104:80"
  proxmox_ssh: "192.0.2.101:22"
  proxmox_https: "https://192.0.2.101:8006"
  wiki_http: "192.0.2.5:3000"
  plantuml_http: "192.0.2.5:18080"
  minio_s3_api: "http://minioserver.example.com:9000"
  minio_console: "http://minioserver.example.com:9001"
