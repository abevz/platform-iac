---
- name: Enable JWT auth method
  ansible.builtin.command: >
    vault auth enable -path={{ vault_jwt_auth_path }} jwt
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
  register: jwt_enable
  changed_when: jwt_enable.rc == 0
  failed_when:
    - jwt_enable.rc != 0
    - "'already in use' not in jwt_enable.stderr"
  tags: vault_jwt

- name: Configure JWT auth with GitLab OIDC discovery
  ansible.builtin.command: >
    vault write auth/{{ vault_jwt_auth_path }}/config
    oidc_discovery_url="{{ vault_jwt_gitlab_url }}"
    bound_issuer="{{ vault_jwt_gitlab_url }}"
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
  changed_when: true
  tags: vault_jwt

- name: Create CI cosign policy
  ansible.builtin.command: >
    vault policy write {{ vault_ci_policy_name }} /dev/stdin
  args:
    stdin: |
      path "secret/data/ci/*" {
        capabilities = ["read"]
      }
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
  changed_when: true
  tags: vault_jwt

- name: Write JWT role JSON to temp file
  ansible.builtin.copy:
    dest: /tmp/vault-ci-role.json
    mode: "0600"
    content: |
      {
        "role_type": "jwt",
        "bound_audiences": ["{{ vault_addr }}"],
        "bound_claims_type": "glob",
        "bound_claims": {
          "project_path": "{{ vault_ci_project_path }}"
        },
        "user_claim": "sub",
        "policies": ["{{ vault_ci_policy_name }}"],
        "ttl": "1h"
      }
  tags: vault_jwt

- name: Create JWT role for CI pipeline
  ansible.builtin.command: >
    vault write auth/{{ vault_jwt_auth_path }}/role/{{ vault_ci_jwt_role_name }}
    @/tmp/vault-ci-role.json
  environment:
    VAULT_ADDR: "{{ vault_addr }}"
  changed_when: true
  tags: vault_jwt

- name: Remove JWT role temp file
  ansible.builtin.file:
    path: /tmp/vault-ci-role.json
    state: absent
  tags: vault_jwt
