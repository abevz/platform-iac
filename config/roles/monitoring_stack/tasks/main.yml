---
- name: Read Tofu inventory output for each k8s environment
  ansible.builtin.command:
    cmd: tofu -chdir={{ playbook_dir }}/../../infra/{{ item }} output -raw ansible_inventory_data
  loop: "{{ monitoring_k8s_environments }}"
  register: monitoring_k8s_tofu_outputs
  delegate_to: localhost
  become: false
  changed_when: false
  when: monitoring_k8s_environments | length > 0

- name: Build monitoring_k8s_clusters from Tofu state
  ansible.builtin.set_fact:
    monitoring_k8s_clusters: >-
      {{ monitoring_k8s_clusters + [{
        'name': (item.item | regex_replace('/', '-')),
        'node_ips': ((item.stdout | from_json)._meta.hostvars.values()
                     | map(attribute='ansible_host') | list),
        'api_server': ((item.stdout | from_json)._meta.hostvars.values()
                       | map(attribute='ansible_host') | list | first)
      }] }}
  loop: "{{ monitoring_k8s_tofu_outputs.results | default([]) }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - monitoring_k8s_environments | length > 0
    - item.stdout is defined

- name: Resolve Vault Agent flag from flat or nested vars
  ansible.builtin.set_fact:
    monitoring_vault_agent_enabled: >-
      {{ monitoring_vault_agent_enabled | default((monitoring | default({})).get('vault_agent_enabled', false), true) }}

- name: Enrich k8s clusters with Vault K8s secrets role
  ansible.builtin.set_fact:
    monitoring_k8s_clusters: >-
      {{ monitoring_k8s_clusters | map('combine',
         {'vault_k8s_role': monitoring_vault_k8s_default_role})
         | list }}
  when:
    - monitoring_vault_agent_enabled | default(false)
    - monitoring_vault_k8s_default_role | default('') | length > 0

- name: Resolve monitoring secrets from flat or nested vars
  ansible.builtin.set_fact:
    monitoring_domain_resolved: >-
      {{ (platform_domains | default({})).primary
         | default(primary_domain | default(mailserver_domain | default((mailserver | default({})).get('domain', ''), true), true), true) }}
    monitoring_proxmox_token_id_resolved: >-
      {{ monitoring_proxmox_token_id | default((monitoring | default({})).get('proxmox_token_id', ''), true) }}
    monitoring_proxmox_token_name_resolved: >-
      {{ monitoring_proxmox_token_name | default((monitoring | default({})).get('proxmox_token_name', ''), true) }}
    monitoring_proxmox_token_secret_resolved: >-
      {{ monitoring_proxmox_token_secret | default((monitoring | default({})).get('proxmox_token_secret', ''), true) }}
    monitoring_telegram_bot_token_resolved: >-
      {{ monitoring_telegram_bot_token | default((monitoring | default({})).get('telegram_bot_token', ''), true) }}
    monitoring_telegram_chat_id_resolved: >-
      {{ monitoring_telegram_chat_id | default((monitoring | default({})).get('telegram_chat_id', ''), true) }}
    monitoring_dns_server_resolved: >-
      {{ (dns | default({})).get('server', {}).get('ip_address',
         (pihole | default({})).get('ip_address', '')) }}
    monitoring_jenkins_url_resolved: >-
      {{ monitoring_jenkins_url | default((monitoring | default({})).get('jenkins_url', ''), true) }}
    monitoring_jenkins_metrics_target_resolved: >-
      {{ monitoring_jenkins_metrics_target | default((monitoring | default({})).get('jenkins_metrics_target', ''), true) }}
    monitoring_jenkins_metrics_path_resolved: >-
      {{ monitoring_jenkins_metrics_path | default((monitoring | default({})).get('jenkins_metrics_path', '/prometheus/'), true) }}
    monitoring_jenkins_metrics_namespace_resolved: >-
      {{ monitoring_jenkins_metrics_namespace | default((monitoring | default({})).get('jenkins_metrics_namespace', 'default'), true) }}
    monitoring_vault_agent_role_id_resolved: >-
      {{ monitoring_vault_agent_role_id | default((monitoring | default({})).get('vault_agent_role_id', ''), true) }}
    monitoring_vault_agent_secret_id_resolved: >-
      {{ monitoring_vault_agent_secret_id | default((monitoring | default({})).get('vault_agent_secret_id', ''), true) }}
    monitoring_vault_agent_vault_addr_resolved: >-
      {{ monitoring_vault_agent_vault_addr | default((monitoring | default({})).get('vault_agent_vault_addr', vault_addr | default('https://vault.bevz.net', true)), true) }}

- name: Validate required monitoring variables
  ansible.builtin.assert:
    that:
      - monitoring_domain_resolved | length > 0
      - monitoring_proxmox_token_id_resolved | length > 0
      - monitoring_proxmox_token_name_resolved | length > 0
      - monitoring_proxmox_token_secret_resolved | length > 0
    fail_msg: >-
      primary domain and monitoring Proxmox token variables must be provided
      via encrypted Ansible vars.

- name: Validate Vault Agent variables when enabled
  ansible.builtin.assert:
    that:
      - monitoring_vault_agent_vault_addr_resolved | length > 0
    fail_msg: >-
      monitoring.vault_agent_vault_addr must be provided when Vault Agent is enabled.
  when: monitoring_vault_agent_enabled | default(false)

- name: Build effective blackbox targets
  ansible.builtin.set_fact:
    monitoring_blackbox_targets_effective: >-
      {{ (monitoring_blackbox_targets | default([])) +
         ([monitoring_jenkins_url_resolved] if
         ((monitoring_jenkins_url_resolved | default('') | length > 0) and
          (monitoring_jenkins_url_resolved not in (monitoring_blackbox_targets | default([]))))
         else []) }}

- name: Ensure monitoring apt dependencies are installed
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      - apt-transport-https
      - python3-docker
    state: present
    update_cache: true
  become: true

- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
  become: true

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
  become: true

- name: Install Docker engine and compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true

- name: Ensure monitoring directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ monitoring_install_dir }}", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/prometheus", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/alertmanager", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/grafana", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/grafana/provisioning", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/grafana/provisioning/datasources", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/grafana/provisioning/dashboards", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/grafana/dashboards", mode: "0755" }
    - { path: "{{ monitoring_install_dir }}/pve-exporter", mode: "0750" }
    - { path: "{{ monitoring_install_dir }}/blackbox", mode: "0755" }
  become: true

- name: Ensure Vault Agent directory exists
  ansible.builtin.file:
    path: "{{ monitoring_install_dir }}/vault-agent"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: monitoring_vault_agent_enabled | default(false)

- name: Ensure Vault Agent token directory exists
  ansible.builtin.file:
    path: "{{ monitoring_install_dir }}/vault-agent/tokens"
    state: directory
    owner: root
    group: root
    mode: "0777"
  become: true
  when: monitoring_vault_agent_enabled | default(false)

- name: Render Vault Agent config
  ansible.builtin.template:
    src: vault-agent.hcl.j2
    dest: "{{ monitoring_install_dir }}/vault-agent/agent.hcl"
    mode: "0644"
  notify: Restart monitoring stack
  become: true
  when: monitoring_vault_agent_enabled | default(false)

- name: Write Vault Agent AppRole role-id
  ansible.builtin.copy:
    dest: "{{ monitoring_install_dir }}/vault-agent/role-id"
    content: "{{ monitoring_vault_agent_role_id_resolved }}"
    mode: "0644"
  notify: Restart monitoring stack
  become: true
  no_log: true
  when: monitoring_vault_agent_enabled | default(false)

- name: Write Vault Agent AppRole secret-id
  ansible.builtin.copy:
    dest: "{{ monitoring_install_dir }}/vault-agent/secret-id"
    content: "{{ monitoring_vault_agent_secret_id_resolved }}"
    mode: "0644"
  notify: Restart monitoring stack
  become: true
  no_log: true
  when: monitoring_vault_agent_enabled | default(false)

- name: Render Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_install_dir }}/prometheus/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render alert rules
  ansible.builtin.template:
    src: alerts.yml.j2
    dest: "{{ monitoring_install_dir }}/prometheus/alerts.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: "{{ monitoring_install_dir }}/alertmanager/alertmanager.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render pve-exporter config
  ansible.builtin.template:
    src: pve.yml.j2
    dest: "{{ monitoring_install_dir }}/pve-exporter/pve.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render blackbox exporter config
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ monitoring_install_dir }}/blackbox/blackbox.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: "{{ monitoring_install_dir }}/grafana/provisioning/datasources/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provider.yml.j2
    dest: "{{ monitoring_install_dir }}/grafana/provisioning/dashboards/default.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render Grafana overview dashboard
  ansible.builtin.template:
    src: grafana-dashboard-overview.json.j2
    dest: "{{ monitoring_install_dir }}/grafana/dashboards/homelab-overview.json"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Render Jenkins dashboard
  ansible.builtin.template:
    src: grafana-dashboard-jenkins.json.j2
    dest: "{{ monitoring_install_dir }}/grafana/dashboards/jenkins-overview.json"
    mode: "0644"
  notify: Restart monitoring stack
  become: true
  when: monitoring_jenkins_url_resolved | default('') | length > 0

- name: Render Jenkins metrics dashboard
  ansible.builtin.template:
    src: grafana-dashboard-jenkins-metrics.json.j2
    dest: "{{ monitoring_install_dir }}/grafana/dashboards/jenkins-metrics.json"
    mode: "0644"
  notify: Restart monitoring stack
  become: true
  when: monitoring_jenkins_metrics_target_resolved | default('') | length > 0

- name: Render K8s pod discovery dashboard
  ansible.builtin.template:
    src: grafana-dashboard-k8s-pod-discovery.json.j2
    dest: "{{ monitoring_install_dir }}/grafana/dashboards/k8s-pod-discovery.json"
    mode: "0644"
  notify: Restart monitoring stack
  become: true
  when: monitoring_vault_agent_enabled | default(false)

- name: Download Grafana dashboards from grafana.com
  ansible.builtin.get_url:
    url: "https://grafana.com/api/dashboards/{{ item.id }}/revisions/latest/download"
    dest: "{{ monitoring_install_dir }}/grafana/dashboards/{{ item.name }}.json"
    mode: "0644"
    force: true
  loop: "{{ monitoring_grafana_dashboards }}"
  loop_control:
    label: "{{ item.name }} (id={{ item.id }})"
  notify: Restart monitoring stack
  become: true

- name: Bind downloaded dashboards to Prometheus datasource
  ansible.builtin.replace:
    path: "{{ monitoring_install_dir }}/grafana/dashboards/{{ item.name }}.json"
    regexp: '"\$\{DS_[A-Z0-9_-]+\}"'
    replace: '"{{ monitoring_grafana_datasource_uid }}"'
  loop: "{{ monitoring_grafana_dashboards }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart monitoring stack
  become: true

- name: Render monitoring docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_install_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart monitoring stack
  become: true

- name: Deploy monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_install_dir }}"
    project_name: "{{ monitoring_compose_project_name }}"
    state: present
  become: true

- name: Flush handlers to apply config updates
  ansible.builtin.meta: flush_handlers
