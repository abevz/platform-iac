---
- name: Install rclone
  ansible.builtin.apt:
    name: rclone
    state: present
    update_cache: false
  become: true
  when: gitlab_backup_rclone_enabled | bool

- name: Render rclone config for GitLab backup
  ansible.builtin.copy:
    content: "{{ gitlab_backup_rclone_config }}"
    dest: "{{ gitlab_backup_rclone_config_file }}"
    owner: root
    group: root
    mode: "0600"
  become: true
  no_log: true
  when: gitlab_backup_rclone_enabled | bool

- name: Render GitLab backup script
  ansible.builtin.template:
    src: gitlab-backup-gdrive.sh.j2
    dest: "{{ gitlab_backup_script }}"
    owner: root
    group: root
    mode: "0750"
  become: true
  when: gitlab_backup_rclone_enabled | bool

- name: Render GitLab backup systemd service
  ansible.builtin.template:
    src: gitlab-backup.service.j2
    dest: /etc/systemd/system/gitlab-backup-gdrive.service
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd
  when: gitlab_backup_rclone_enabled | bool

- name: Render GitLab backup systemd timer
  ansible.builtin.template:
    src: gitlab-backup.timer.j2
    dest: /etc/systemd/system/gitlab-backup-gdrive.timer
    owner: root
    group: root
    mode: "0644"
  become: true
  notify: Reload systemd
  when: gitlab_backup_rclone_enabled | bool

- name: Enable and start GitLab backup timer
  ansible.builtin.systemd:
    name: gitlab-backup-gdrive.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true
  when: gitlab_backup_rclone_enabled | bool
