- name: Generate self-signed certificate
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -newkey rsa:4096 -days 3650 -nodes
      -keyout {{ clickhouse_ssl_key }}
      -out {{ clickhouse_ssl_cert }}
      -subj "/CN={{ ansible_hostname }}"
    creates: "{{ clickhouse_ssl_cert }}"

- name: Set cert permissions
  ansible.builtin.file:
    path: "{{ item }}"
    owner: clickhouse
    group: clickhouse
    mode: "0640"
  loop:
    - "{{ clickhouse_ssl_cert }}"
    - "{{ clickhouse_ssl_key }}"
