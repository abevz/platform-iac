# config/roles/jenkins_setup/handlers/main.yml
---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: yes
  become: yes

- name: Restart Jenkins stack
  community.docker.docker_compose_v2:
    project_src: "{{ jenkins_root_dir }}"
    state: restarted
    pull: missing
  become: yes
