---
# Central variable mapping to bridge SOPS secrets with role variables
# These variables will be available to all playbooks

primary_domain: >-
  {{ (platform_domains | default({})).primary
     | default(server_domain | default((mailserver | default({})).domain | default("<your-domain>.com")), true) }}
dev_domain: >-
  {{ (platform_domains | default({})).dev
     | default(dev_domain_secret | default("<your-dev-domain>.dev"), true) }}
mailserver_domain: >-
  {{ (platform_domains | default({})).mail
     | default((mailserver | default({})).domain | default(primary_domain), true) }}
mailserver_hostname: '{{ mailserver.hostname | default("mail." ~ mailserver_domain) }}'
